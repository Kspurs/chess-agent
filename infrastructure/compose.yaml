services:
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "2", memory: 1G }

  web:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
    ports: ["8080:80"]
    depends_on: [api]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U chess"], interval: 5s, timeout: 3s, retries: 10 }

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis-data:/data"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10 }

volumes:
  postgres-data:
  redis-data:

