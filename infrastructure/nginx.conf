server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /v1/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /health { proxy_pass http://api:3000; }
  location / { try_files $uri /index.html; }
}

